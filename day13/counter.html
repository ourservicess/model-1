<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>React Click Counter</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="bg-gray-100 flex items-center justify-center min-h-screen">
    <div id="root"></div>
    <script type="text/babel">
        const { useState } = React;
        function Counter() {
            const [count, setCount] = useState(0);

            function handleClick() {
                setCount(count + 1);
            }

            function handleReset() {
                setCount(0);
            }
            return (
                <div class="flex flex-col items-center bg-white p-8 rounded-2xl shadow-xl w-80">
                    <h1 class="text-2xl font-bold text-gray-800 mb-2">Click Counter</h1>
                    <p class="text-sm text-gray-500 mb-6">Simple handle click tracker</p>

                    <div class="text-6xl font-extrabold text-blue-600 mb-8 tabular-nums">
                        {count}
                    </div>

                    <div class="flex gap-4 w-full">
                        <button
                            onClick={handleClick}
                            class="flex-1 px-4 py-3 bg-blue-600 text-white font-semibold rounded-xl hover:bg-blue-700 active:scale-95 transition-all shadow-md focus:outline-none focus:ring-2 focus:ring-blue-400">Click Me
                        </button>

                        <button
                            onClick={handleReset}
                            class="px-4 py-3 bg-gray-200 text-gray-700 font-semibold rounded-xl hover:bg-gray-300 active:scale-95 transition-all focus:outline-none focus:ring-2 focus:ring-gray-400"
                        >
                            Reset
                        </button>
                    </div>
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<Counter />);
    </script>
</body>

</html>
