<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Float Property</title>
    <style>
        #division1{
            text-align: center;
            text-size-adjust: calc(1.2px);
            background-color : red;
            float : left;
            width: 70%;
            margin-top: auto;
            padding-block: calc(11.2px);
        }
        #division2{
            text-align: center;
            text-size-adjust: calc(1.2rem);
            background-color : blue;
            float : right;
            width: 70%;
            margin-top: auto;
            padding-block: calc(1.2rem);
        }
    </style>
</head>
<body>
    <div id="division1">HOME PAGE</div>
    <div id="division2">CONTENT</div>
</body>
</html>
