<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Rotating Color Wheel</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #121212;
            font-family: sans-serif;
        }
        .wheel-container {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .color-wheel {
            width: 350px;
            height: 350px;
            border-radius: 50%;
            border: 4px solid #333;
            background: conic-gradient(#ff0000, #ff8000, #ffff00, #00ff00,#00ffff, #0000ff, #7f00ff, #ff00ff, #ff0000);
            animation: rotateWheel 5s linear infinite;
            box-shadow: 0 0 50px rgba(255, 255, 255, 0.1);
        }
        .color-wheel::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 40px;
            height: 40px;
            background-color: #121212;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            border: 4px solid #333;
        }
        .bounce-box {
            position: absolute;
            width: 200px;
            height: 200px;
            animation: bounceX 4.3s linear infinite alternate,bounceY 3.7s linear infinite alternate;
        }
        @keyframes rotateWheel {
            from {
                transform: rotate(360deg);
            }
            to {
                transform: rotate(0deg);
            }
        }
        h2 {
            color: white;
            margin-top: 30px;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-size: 1.2rem;
        }
    </style>
</head>
<body>
 
    <div class="wheel-container">
        <div class="color-wheel" class="bounce-box"></div>
        <h2>CSS Color Wheel</h2>
    </div>

</body>
</html>
