<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bouncing & Rotating Color Wheel</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            width: 100vw;
            background-color: #0a0a0a;
            overflow: hidden; 
        }
        .bounce-box {
            position: absolute;
            width: 200px;
            height: 200px;
            animation: bounceX 4.3s linear infinite alternate,bounceY 3.7s linear infinite alternate;
        }
        .color-wheel {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: conic-gradient( red, yellow, lime, aqua, blue, magenta, red);
            border: 2px solid #fff;
            box-shadow: 0 0 0 rgba(255, 255, 255, 0.2);
            animation: rotateWheel 1s linear infinite;
        }
        @keyframes rotateWheel {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        @keyframes bounceX {
            from { left: 0px; }
            to { left: calc(100vw - 200px); }
        }
        @keyframes bounceY {
            from { top: 0px; }
            to { top: calc(100vh - 200px); }
        }
    </style>
</head>
<body>

    <div class="bounce-box">
        <div class="color-wheel"></div>
    </div>

</body>
</html>
