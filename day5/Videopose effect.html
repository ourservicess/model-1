<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Positioning Effect</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Arial', sans-serif;
            overflow-x: hidden;
        }
        .video-wrapper {
            position: relative;
            width: 100%;
            height: 100vh;
            background-color: #000; 
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .video-wrapper video{
            position: absolute;
            top: 50%;
            left: 50%;
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            z-index: 0;
            transform: translate(-50%, -50%);
            object-fit: cover;
        }
        .video-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            z-index: 1;
        }
        .content {
            position: relative;
            z-index: 2;
            text-align: center;
            color: white;
        }
        .content h1 {
            font-size: 4rem;
            text-transform: uppercase;
            letter-spacing: 5px;
        }
        .content p {
            font-size: 1.2rem;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <section class="video-wrapper">
        <video autoplay muted loop playsinline poster="fallback-image.jpg">
            <source src="W video.mp4" type="video/mp4">
        </video>
        <div class="video-overlay"></div>
        <div class="content">
            <h1>Narendra Modi Stadium</h1>
            <p>14 / 02 / 2026</p>
        </div>
    </section>
</body>
</html>
