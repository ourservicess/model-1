<!DOCTYPE html>
<html>
<head>

<title>Admin Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container py-4">

<h1 class="mb-4">
🏥 JK Medical Admin Dashboard
</h1>

<!-- ORDERS -->

<div class="card mb-4">

<div class="card-header bg-primary text-white">
📦 Order History
</div>

<div class="card-body">

<table class="table table-bordered">

<thead>

<tr>
<th>ID</th>
<th>Customer</th>
<th>Email</th>
<th>Total</th>
<th>Payment</th>
<th>Date</th>
</tr>

</thead>

<tbody id="ordersTable">

</tbody>

</table>

</div>

</div>

<!-- REPAIRS -->

<div class="card">

<div class="card-header bg-danger text-white">
🔧 Repair Requests
</div>

<div class="card-body">

<table class="table table-bordered">

<thead>

<tr>
<th>ID</th>
<th>Customer</th>
<th>Machine</th>
<th>Phone</th>
<th>Urgency</th>
<th>Status</th>
</tr>

</thead>

<tbody id="repairsTable">

</tbody>

</table>

</div>

</div>

</div>

<script>

async function loadOrders(){

const response =
await fetch('http://localhost:5001/api/orders');

const data =
await response.json();

document.getElementById('ordersTable').innerHTML =
data.orders.map(order => `

<tr>

<td>${order.id}</td>

<td>${order.customerName}</td>

<td>${order.customerEmail}</td>

<td>₹${order.total}</td>

<td>${order.paymentMode}</td>

<td>${new Date(order.createdAt)
.toLocaleDateString()}</td>

</tr>

`).join('');

}

async function loadRepairs(){

const response =
await fetch('http://localhost:5001/api/repairs');

const data =
await response.json();

document.getElementById('repairsTable').innerHTML =
data.requests.map(r => `

<tr>

<td>${r.id}</td>

<td>${r.customerName}</td>

<td>${r.machineName}</td>

<td>${r.phone}</td>

<td>${r.urgency}</td>

<td>${r.status}</td>

</tr>

`).join('');

}

loadOrders();
loadRepairs();

</script>

</body>
</html>
